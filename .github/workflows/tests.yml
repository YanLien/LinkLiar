name: CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            linktools-rs/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('linktools-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: linktools-rs
        run: cargo test --lib

      - name: Build Rust library (release)
        working-directory: linktools-rs
        run: cargo build --release

      - name: Upload Rust library
        uses: actions/upload-artifact@v4
        with:
          name: liblinktools
          path: linktools-rs/target/release/liblinktools.dylib

  xcode-build:
    name: Xcode Build & Tests
    runs-on: macos-15
    needs: rust-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Rust library
        uses: actions/download-artifact@v4
        with:
          name: liblinktools
          path: LinkLiar/

      # Install certificate only when secrets are configured
      - name: Install Developer Certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          BUILD_CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          CUSTOM_KEYCHAIN_PATH=$RUNNER_TEMP/linkliar.keychain

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $BUILD_CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $CUSTOM_KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $CUSTOM_KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $CUSTOM_KEYCHAIN_PATH
          security import $BUILD_CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $CUSTOM_KEYCHAIN_PATH
          security list-keychain -d user -s $CUSTOM_KEYCHAIN_PATH

      # Build without signing when no certificate is available
      - name: Build (no signing)
        if: ${{ env.BUILD_CERTIFICATE_BASE64 == '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        run: |
          xcodebuild build -scheme LinkLiar \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build & Test (with signing)
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        run: xcodebuild test -scheme LinkLiar
